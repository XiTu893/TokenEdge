name: Build PC Application

on:
  push:
    branches: [ main ]
    paths:
      - 'PC/**'
      - '.github/workflows/build-pc.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'PC/**'
      - '.github/workflows/build-pc.yml'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Windows Build Tools
        run: |
          npm install -g windows-build-tools
      
      - name: Install dependencies
        run: |
          cd PC
          bun install
      
      - name: Build Windows Application
        run: |
          cd PC
          bun run build:win
      
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: TokenEdge-Windows
          path: PC/dist/*.exe
          if-no-files-found: error
  
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-dev build-essential libx11-dev libxkbfile-dev libsecret-1-dev libkrb5-dev
      
      - name: Install dependencies
        run: |
          cd PC
          bun install
      
      - name: Build Linux Application
        run: |
          cd PC
          bun run build:linux
      
      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: TokenEdge-Linux
          path: PC/dist/*.AppImage
          if-no-files-found: error
  
  build-macos:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Xcode Command Line Tools
        run: |
          xcode-select --install || true
      
      - name: Install dependencies
        run: |
          cd PC
          bun install
      
      - name: Build macOS Application
        run: |
          cd PC
          bun run build:mac
      
      - name: Upload macOS Build
        uses: actions/upload-artifact@v4
        with:
          name: TokenEdge-macOS
          path: PC/dist/*.dmg
          if-no-files-found: error
